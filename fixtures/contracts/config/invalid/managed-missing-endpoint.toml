schema_version = "v1"

[agent]
agent_id = "agent-001"
environment_id = "prod-cn"
instance_name = "local"

[control_plane]
enabled = true
tls_mode = "tls"
auth_mode = "mtls"

[paths]
root_dir = "/var/lib/warp-insight"
run_dir = "/var/lib/warp-insight/run"
state_dir = "/var/lib/warp-insight/state"
log_dir = "/var/log/warp-insight"

[execution]
cancel_grace_ms = 5000
default_stdout_limit_bytes = 1048576
default_stderr_limit_bytes = 1048576
